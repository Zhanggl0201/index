<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>资源站 · YunfanTech</title>
<style>
  :root{
    --accent: #5B9CFF;
    --accent-soft: #7AA2FF;
    --text-sub: #AEB8CC;
    --white: #FFFFFF;
    --font: "Sarasa Gothic SC", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", -apple-system, sans-serif;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{
    background:#04060F;
    font-family:var(--font);
    color:var(--white);
    min-height:100vh;
  }
  body{ overflow-x:hidden; -webkit-tap-highlight-color:transparent; }

  .page{
    position:relative;
    min-height:100vh;
    padding:104px 24px 72px;
    display:flex; flex-direction:column; align-items:center;
  }

  /* Ambient glow blobs (same family as the homepage) */
  .glow{ position:fixed; border-radius:50%; filter:blur(90px); z-index:0; pointer-events:none; }
  .glow.a{ width:540px; height:540px; background:radial-gradient(circle, rgba(91,156,255,.18), transparent 70%); top:-180px; right:-140px; }
  .glow.b{ width:480px; height:480px; background:radial-gradient(circle, rgba(122,162,255,.12), transparent 70%); bottom:-200px; left:-160px; }

  /* Top bar: logo (left) + logout (right) — mirrors the homepage */
  .logo{ position:absolute; left:52px; top:30px; width:275px; z-index:6; }
  .logo img{ width:100%; height:auto; display:block; object-fit:contain; object-position:left center; }
  .logout{
    position:absolute; right:24px; top:26px; z-index:7;
    display:flex; align-items:center; gap:6px;
    height:36px; padding:0 14px;
    border-radius:18px;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.20);
    color:var(--white); font-size:13px; font-family:var(--font);
    cursor:pointer; user-select:none;
    transition:background .25s ease, border-color .25s ease;
  }
  .logout:hover{ background:rgba(255,255,255,.18); border-color:rgba(255,255,255,.35); }
  .logout svg{ width:15px; height:15px; }

  /* Heading */
  .head{ position:relative; z-index:1; text-align:center; margin-bottom:22px; display:flex; flex-direction:column; gap:12px; align-items:center; padding:0 16px; }
  .head h1{ font-size:clamp(30px, 4vw, 44px); font-weight:700; line-height:1.2; }
  .head .sub{ font-size:clamp(14px, 1.6vw, 18px); color:var(--text-sub); }
  .head .hint{ font-size:13px; color:rgba(174,184,204,.7); }

  /* Breadcrumb */
  .crumb{ position:relative; z-index:1; margin-bottom:22px; font-size:14px; color:var(--text-sub); display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center; }
  .crumb .crumb-link{ color:var(--accent-soft); cursor:pointer; }
  .crumb .crumb-link:hover{ text-decoration:underline; }
  .crumb .sep{ opacity:.5; }
  .crumb .cur{ color:var(--white); font-weight:600; }

  /* Card wall — auto-flowing grid, centered */
  .grid{
    position:relative; z-index:1;
    width:100%; max-width:1080px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 300px));
    gap:24px; justify-content:center;
  }
  .card{
    min-height:150px; padding:24px;
    border-radius:18px;
    display:flex; flex-direction:column; align-items:flex-start; gap:10px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.22);
    -webkit-backdrop-filter:blur(18px);
    backdrop-filter:blur(18px);
    box-shadow:0 10px 30px rgba(0,0,0,.25), inset 0 1px 2px rgba(255,255,255,.18);
    text-decoration:none; color:inherit; cursor:pointer;
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
  }
  .card:hover{ transform:translateY(-4px); background:rgba(255,255,255,.16); border-color:rgba(255,255,255,.35); }
  .card:active{ transform:scale(.98); }
  .card .row{ width:100%; display:flex; align-items:center; justify-content:space-between; }
  .chip{
    width:44px; height:44px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(92,156,255,.18);
    border:1px solid rgba(255,255,255,.15);
  }
  .chip svg{ width:26px; height:26px; display:block; }
  .card .arrow-icon{ font-size:20px; font-weight:700; color:var(--accent-soft); }
  .card .title{ font-size:18px; font-weight:600; color:var(--white); word-break:break-all; }
  .card .desc{ font-size:13px; font-weight:400; color:var(--text-sub); line-height:1.5; }
  .card .meta{ margin-top:auto; font-size:12px; color:rgba(174,184,204,.65); }

  /* Loading / empty / error states */
  .state{ position:relative; z-index:1; width:100%; max-width:1080px; padding:48px 16px; text-align:center; color:var(--text-sub); font-size:15px; line-height:1.8; }
  .state .btn{ display:inline-block; margin-top:16px; padding:10px 22px; border-radius:12px; background:linear-gradient(135deg,#5B9CFF,#7AA2FF); color:#fff; font-size:15px; font-weight:600; text-decoration:none; box-shadow:0 8px 24px rgba(91,156,255,.35); }
  .state code{ color:var(--accent-soft); }

  @media (max-width:768px){
    .page{ padding:96px 18px 56px; }
    .logo{ left:50%; top:24px; width:160px; transform:translateX(-50%); }
    .logo img{ object-position:center; }
    .logout{ right:16px; top:20px; height:32px; padding:0 12px; font-size:12px; }
    .head{ margin-bottom:16px; }
    .card{ min-height:130px; padding:20px 22px; }
    .card .title{ font-size:17px; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="glow a"></div>
    <div class="glow b"></div>

    <!-- Logo -->
    <div class="logo"><img src="assets/images/logo.png" alt="Yunfan Tech"></div>

    <!-- Logout -->
    <div class="logout" id="logoutBtn" aria-label="退出登录">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      <span>退出</span>
    </div>

    <!-- Heading -->
    <div class="head">
      <h1>资源站</h1>
      <p class="sub">YunfanTech · 资源分享与下载</p>
      <p class="hint">实时读取你的 OneDrive，文件增删自动同步</p>
    </div>

    <!-- Breadcrumb -->
    <div class="crumb" id="crumb"></div>

    <!-- Card wall (filled by JS) -->
    <div class="grid" id="grid"></div>
  </div>

<script>
  /* 退出登录：清掉边缘鉴权 Cookie，跳回登录页（访问防护由 EdgeOne middleware.js 负责） */
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try{ await fetch('/api/logout', { method: 'POST' }); }catch(_){}
    location.href = '/login.html';
  });

  const grid = document.getElementById('grid');
  const crumb = document.getElementById('crumb');

  // 根目录（与 EdgeOne 环境变量 OD_ROOT 保持一致，默认 /Public）
  const ROOT = '/Public';
  let currentPath = new URLSearchParams(location.search).get('path') || ROOT;

  const ICONS = {
    folder: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
    image: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>',
    video: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="white" stroke="none"/></svg>',
    doc: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/></svg>',
    zip: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M12 12v4"/><path d="M9 12v4"/><path d="M15 12v4"/></svg>',
    file: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
  };
  function iconFor(it){
    if (it.isFolder) return ICONS.folder;
    const n = it.name.toLowerCase();
    if (/\.(png|jpe?g|gif|webp|bmp|svg|avif)$/.test(n)) return ICONS.image;
    if (/\.(mp4|webm|mov|mkv|avi|m4v)$/.test(n)) return ICONS.video;
    if (/\.(pdf|docx?|xlsx?|pptx?|txt|md|odt)$/.test(n)) return ICONS.doc;
    if (/\.(zip|rar|7z|tar|gz|bz2)$/.test(n)) return ICONS.zip;
    return ICONS.file;
  }
  function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmtSize(b){
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
    return (b/1073741824).toFixed(2) + ' GB';
  }

  function renderCrumb(path){
    const parts = path.split('/').filter(Boolean);
    const links = ['<span class="crumb-link" data-path="'+ROOT+'">资源站</span>'];
    if (parts.length > 1){
      const last = parts[parts.length-1];
      links.push('<span class="sep">/</span><span class="cur">'+esc(last)+'</span>');
    }
    crumb.innerHTML = links.join(' ');
    crumb.querySelector('[data-path]').addEventListener('click', () => go(ROOT));
  }

  function cardHtml(it, i){
    const isF = it.isFolder;
    return '<div class="card" data-i="'+i+'">'
      + '<div class="row"><div class="chip">'+iconFor(it)+'</div>'
      + '<span class="arrow-icon">'+(isF ? '&#8594;' : '&#8599;')+'</span></div>'
      + '<div class="title">'+esc(it.name)+'</div>'
      + '<div class="desc">'+(isF ? '文件夹' : fmtSize(it.size))+'</div>'
      + '<div class="meta">'+(isF ? 'OneDrive · 文件夹' : 'OneDrive · '+fmtSize(it.size))+'</div>'
      + '</div>';
  }

  function go(path){
    currentPath = path;
    const u = new URL(location.href);
    u.searchParams.set('path', path);
    history.pushState({}, '', u);
    load();
  }

  async function load(){
    grid.innerHTML = '<div class="state">读取 OneDrive 中…</div>';
    try {
      const r = await fetch('/api/onedrive-list?path=' + encodeURIComponent(currentPath));
      const d = await r.json();
      if (!d.ok) {
        if (d.error === 'NOT_AUTH') {
          grid.innerHTML = '<div class="state">资源站尚未连接 OneDrive。<br>'
            + '请先 <a class="btn" href="/api/onedrive-auth">前往授权</a></div>';
          return;
        }
        if (d.error === 'NOT_CONFIGURED') {
          grid.innerHTML = '<div class="state">站点未配置 OneDrive：<br>请在 EdgeOne 控制台设置 <code>OD_CLIENT_ID</code> / <code>OD_CLIENT_SECRET</code> 并重新部署。</div>';
          return;
        }
        if (d.error === 'KV_NOT_BOUND') {
          grid.innerHTML = '<div class="state">站点未绑定 KV 存储：<br>请在 EdgeOne 控制台创建并绑定 KV 命名空间（变量名 <code>my_kv</code>）。</div>';
          return;
        }
        grid.innerHTML = '<div class="state">加载失败：<code>'+esc(d.error||'')+'</code>'
          + (d.detail ? ('<br>'+esc(d.detail)) : '') + '</div>';
        return;
      }
      renderCrumb(d.path);
      if (!d.items.length) {
        grid.innerHTML = '<div class="state">这个文件夹是空的。</div>';
        return;
      }
      const items = d.items;
      grid.innerHTML = items.map((it,i)=>cardHtml(it,i)).join('');
      grid.querySelectorAll('.card').forEach(el => {
        const it = items[+el.dataset.i];
        el.addEventListener('click', () => {
          if (it.isFolder) { go(it.path); }
          else if (it.downloadUrl) { window.open(it.downloadUrl, '_blank', 'noopener'); }
          else { alert('此文件无直链，请在 OneDrive 内打开'); }
        });
      });
    } catch (e) {
      grid.innerHTML = '<div class="state">请求出错：'+esc(e.message)+'</div>';
    }
  }

  load();
  window.addEventListener('popstate', () => {
    currentPath = new URLSearchParams(location.search).get('path') || ROOT;
    load();
  });
</script>
</body>
</html>
